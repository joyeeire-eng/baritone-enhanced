name: Build Baritone Enhanced

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Show project structure
      run: |
        echo "Project structure:"
        find . -name "*.gradle" -o -name "*.java" -o -name "*.toml" | head -20
        echo "Gradle wrapper files:"
        ls -la gradle/wrapper/
        echo "Java version:"
        java -version

    - name: Show Gradle version
      run: ./gradlew --version

    - name: Initialize Gradle wrapper
      run: ./gradlew wrapper --gradle-version 8.1.1

    - name: Build project
      run: ./gradlew build --no-daemon --stacktrace

    - name: Show build results
      run: |
        echo "Build directory contents:"
        ls -la build/ || echo "No build directory"
        echo "Libs directory contents:"
        ls -la build/libs/ || echo "No libs directory"

    - name: Upload artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: baritone-enhanced
        path: build/libs/*.jar
        retention-days: 30
