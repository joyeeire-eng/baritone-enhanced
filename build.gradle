plugins {
    id 'net.minecraftforge.gradle' version '6.0.22'
    id 'eclipse'
    id 'maven-publish'
}

version = '1.0.0'
group = 'com.baritone.mod'
archivesBaseName = 'baritone-enhanced'

java.toolchain.languageVersion = JavaLanguageVersion.of(17)

println "Java: ${System.getProperty 'java.version'}"

repositories {
    maven { url 'https://maven.minecraftforge.net' }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.20.1-47.2.0'
    // Temporarily remove Baritone dependency to test build
    // implementation 'cabaletta:baritone:1.20.1:baritone-api'
}

jar {
    manifest {
        attributes([
            "Specification-Title": "baritoneenhanced",
            "Specification-Vendor": "baritone",
            "Specification-Version": "1",
            "Implementation-Title": project.name,
            "Implementation-Version": project.jar.archiveVersion,
            "Implementation-Vendor": "baritone",
            "Implementation-Timestamp": new Date().format("yyyy-MM-dd'T'HH:mm:ssZ")
        ])
    }
}

jar.finalizedBy('reobfJar')

publishing {
    publications {
        mavenJava(MavenPublication) {
            artifact jar
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/mcmodsrepo"
        }
    }
}
